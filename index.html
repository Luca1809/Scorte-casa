<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Scorte Casa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E8E4DC;
    --text: #1A1815;
    --text-muted: #8C8880;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --warning: #E67E22;
    --warning-light: #FEF5EC;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  header {
    background: var(--accent);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(45,90,61,0.25);
  }

  header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  header p {
    font-size: 0.78rem;
    opacity: 0.75;
    margin-top: 2px;
  }

  /* ALERT BANNER */
  #alert-banner {
    display: none;
    margin: 16px 16px 0;
    background: var(--warning-light);
    border: 1px solid #F0C080;
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 0.82rem;
    color: var(--warning);
    font-weight: 500;
  }

  #alert-banner .alert-title {
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #alert-list {
    list-style: none;
    margin-top: 4px;
  }

  #alert-list li::before {
    content: "· ";
    font-weight: bold;
  }

  /* FORM CARD */
  .form-card {
    margin: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .form-card h2 {
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .form-grid input {
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-grid input:focus {
    border-color: var(--accent);
    background: white;
  }

  .form-grid input.full {
    grid-column: 1 / -1;
  }

  .btn-add {
    grid-column: 1 / -1;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-add:active { transform: scale(0.98); opacity: 0.9; }

  /* FILTER BAR */
  .filter-bar {
    margin: 12px 16px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* LISTA */
  #lista {
    margin: 12px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .item.low {
    border-color: #F0C080;
    background: var(--warning-light);
  }

  .item-info { flex: 1; min-width: 0; }

  .item-nome {
    font-weight: 600;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cat-badge {
    background: var(--accent-light);
    color: var(--accent);
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 500;
    font-size: 0.72rem;
  }

  .low .cat-badge {
    background: #F0C080;
    color: #7A4F10;
  }

  .low-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--warning);
  }

  .item-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .qty-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: background 0.15s;
    line-height: 1;
  }

  .qty-btn:active { background: var(--border); }

  .qty-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    min-width: 26px;
    text-align: center;
  }

  .btn-delete {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    background: none;
    cursor: pointer;
    color: #C0B8B0;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
    margin-left: 2px;
  }

  .btn-delete:active { color: var(--danger); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .empty span { font-size: 2rem; display: block; margin-bottom: 8px; }

  /* SECTION TITLE */
  .section-title {
    margin: 16px 16px 4px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #count-badge {
    font-size: 0.72rem;
    background: var(--border);
    color: var(--text-muted);
    padding: 1px 8px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>🏠 Scorte Casa</h1>
  <p>Gestione inventario domestico</p>
</header>

<div id="alert-banner">
  <div class="alert-title">⚠️ Scorte in esaurimento</div>
  <ul id="alert-list"></ul>
</div>

<div class="form-card">
  <h2>Aggiungi scorta</h2>
  <div class="form-grid">
    <input id="nome" class="full" placeholder="Nome prodotto (es. Pasta)" autocomplete="off">
    <input id="categoria" placeholder="Categoria" autocomplete="off">
    <input id="quantita" type="number" placeholder="Quantità" min="0">
    <input id="minimo" type="number" placeholder="Minimo" min="0">
    <button class="btn-add" onclick="aggiungi()">+ Aggiungi</button>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-chip active" data-cat="tutti" onclick="setFiltro('tutti')">Tutti</button>
</div>

<div class="section-title">
  <span>Inventario</span>
  <span id="count-badge">0</span>
</div>

<div id="lista"></div>

<script>
const supabaseUrl = "https://igachimyxuixxltcjsnw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnYWNoaW15eHVpeHhsdGNqc253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDc2MzgsImV4cCI6MjA4NzYyMzYzOH0.ZCxBWrLZNISSnOu-oxFv3zrW2aZsiNljUfQR831arko";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

let tutteLeScorti = [];
let filtroAttivo = "tutti";

async function carica() {
  const { data, error } = await client.from("scorte").select("*").order("nome");
  if (error) { console.error("Errore carica:", error); return; }
  tutteLeScorti = data || [];
  aggiornaFiltri();
  mostra();
  mostraAlert();
}

function aggiornaFiltri() {
  const categorie = [...new Set(tutteLeScorti.map(i => i.categoria).filter(Boolean))];
  const bar = document.getElementById("filter-bar");
  bar.innerHTML = `<button class="filter-chip ${filtroAttivo === 'tutti' ? 'active' : ''}" onclick="setFiltro('tutti')">Tutti</button>`;
  categorie.forEach(cat => {
    bar.innerHTML += `<button class="filter-chip ${filtroAttivo === cat ? 'active' : ''}" onclick="setFiltro('${cat.replace(/'/g, "\\'")}')">${cat}</button>`;
  });
}

function setFiltro(cat) {
  filtroAttivo = cat;
  aggiornaFiltri();
  mostra();
}

function mostraAlert() {
  const basse = tutteLeScorti.filter(i => i.quantita <= i.minimo);
  const banner = document.getElementById("alert-banner");
  const list = document.getElementById("alert-list");
  if (basse.length === 0) {
    banner.style.display = "none";
    return;
  }
  banner.style.display = "block";
  list.innerHTML = basse.map(i => `<li>${i.nome} (${i.quantita} rimasti, min. ${i.minimo})</li>`).join("");
}

async function aggiungi() {
  const nome = document.getElementById("nome").value.trim();
  const categoria = document.getElementById("categoria").value.trim();
  const quantita = parseInt(document.getElementById("quantita").value);
  const minimo = parseInt(document.getElementById("minimo").value);

  if (!nome || isNaN(quantita) || isNaN(minimo)) {
    alert("Compila tutti i campi correttamente.");
    return;
  }

  const { error } = await client.from("scorte").insert([{ nome, categoria, quantita, minimo }]);
  if (error) { console.error("Errore inserimento:", error); alert("Errore: " + error.message); return; }

  ["nome","categoria","quantita","minimo"].forEach(id => document.getElementById(id).value = "");
  carica();
}

async function aggiorna(id, nuovaQ) {
  if (nuovaQ < 0) nuovaQ = 0;
  const { error } = await client.from("scorte").update({ quantita: nuovaQ }).eq("id", id);
  if (error) { console.error("Errore aggiornamento:", error); return; }
  carica();
}

async function elimina(id, nome) {
  if (!confirm(`Eliminare "${nome}"?`)) return;
  const { error } = await client.from("scorte").delete().eq("id", id);
  if (error) { console.error("Errore eliminazione:", error); return; }
  carica();
}

function mostra() {
  const lista = filtroAttivo === "tutti"
    ? tutteLeScorti
    : tutteLeScorti.filter(i => i.categoria === filtroAttivo);

  document.getElementById("count-badge").textContent = lista.length;
  const div = document.getElementById("lista");
  div.innerHTML = "";

  if (lista.length === 0) {
    div.innerHTML = `<div class="empty"><span>📦</span>Nessuna scorta${filtroAttivo !== 'tutti' ? ' in questa categoria' : ''}.</div>`;
    return;
  }

  lista.forEach(item => {
    const low = item.quantita <= item.minimo;
    div.innerHTML += `
      <div class="item ${low ? 'low' : ''}">
        <div class="item-info">
          <div class="item-nome">${item.nome}</div>
          <div class="item-meta">
            ${item.categoria ? `<span class="cat-badge">${item.categoria}</span>` : ''}
            ${low ? `<span class="low-label">⚠ sotto minimo</span>` : `<span>min. ${item.minimo}</span>`}
          </div>
        </div>
        <div class="item-controls">
          <button class="qty-btn" onclick="aggiorna(${item.id}, ${item.quantita - 1})">−</button>
          <span class="qty-display">${item.quantita}</span>
          <button class="qty-btn" onclick="aggiorna(${item.id}, ${item.quantita + 1})">+</button>
          <button class="btn-delete" onclick="elimina(${item.id}, '${item.nome.replace(/'/g, "\\'")}')">🗑</button>
        </div>
      </div>
    `;
  });
}

carica();
</script>
</body>
</html>
